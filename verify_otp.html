{% extends 'base.html' %}
{% block content %}
<div class="container py-5 mt-5">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card shadow p-4">
                <h3 class="text-center">Verify Email</h3>
                <p class="small text-center text-muted">Enter the 6-digit code sent to your email.</p>
                <form method="POST">
                    {% csrf_token %}
                    <div class="form-group mb-3">
                        <input type="text" name="otp" class="form-control text-center" 
                               placeholder="000000" maxlength="6" required 
                               style="font-size: 24px; letter-spacing: 5px;">
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Verify & Register</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
