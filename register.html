{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container-fluid bg-primary py-5 mb-5 hero-header">
    <div class="container py-5">
        <h1 class="display-3 text-white mb-3 animated slideInDown">Register</h1>
    </div>
</div>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card shadow-lg p-4 mb-5 bg-white rounded">
                <h3 class="text-center mb-4">Create Account</h3>

                {% if messages %}
                  {% for message in messages %}
                    <script>alert("{{ message }}");</script>
                  {% endfor %}
                {% endif %}

                <form method="POST">
                    {% csrf_token %}

                    <div class="form-group mb-3">
                        <input type="text" name="name" class="form-control" placeholder="Full Name" required>
                    </div>

                    <div class="form-group mb-3">
                        <input type="email" name="email" class="form-control" placeholder="Email Address" required>
                    </div>

                    <div class="form-group mb-3">
                        <input type="text" name="phone" class="form-control" placeholder="Phone Number" required>
                    </div>

                    <div class="form-group mb-3">
                        <select id="stateSelect" name="state" class="form-select" required onchange="updateCities()">
                            <option value="" disabled selected>Select State</option>
                            </select>
                    </div>

                    <div class="form-group mb-3">
                        <select id="citySelect" name="city" class="form-select" required disabled>
                            <option value="" disabled selected>Select City</option>
                        </select>
                    </div>

                    <div class="form-group mb-3">
                        <input type="password" name="password" class="form-control" placeholder="Password" required>
                    </div>

                    <div class="form-group mb-4">
                        <input type="password" name="confirmpassword" class="form-control" placeholder="Confirm Password" required>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 py-2">Register</button>
                </form>

                <p class="text-center mt-3">
                    Already have an account? <a href="{% url 'login' %}" class="text-primary">Login</a>
                </p>
            </div>
        </div>
    </div>
</div>

<script>
   const stateCityData = {
  "Andhra Pradesh": ["Visakhapatnam", "Vijayawada", "Guntur", "Tirupati", "Nellore", "Kurnool"],
  "Arunachal Pradesh": ["Itanagar", "Tawang", "Pasighat"],
  "Assam": ["Guwahati", "Dibrugarh", "Silchar", "Jorhat", "Tezpur"],
  "Bihar": ["Patna", "Gaya", "Muzaffarpur", "Bhagalpur", "Darbhanga"],
  "Chhattisgarh": ["Raipur", "Bilaspur", "Durg", "Bhilai", "Korba"],
  "Goa": ["Panaji", "Margao", "Vasco da Gama", "Mapusa"],
  "Gujarat": ["Ahmedabad", "Surat", "Vadodara", "Rajkot", "Bhavnagar", "Jamnagar"],
  "Haryana": ["Gurugram", "Faridabad", "Panipat", "Ambala", "Hisar", "Karnal"],
  "Himachal Pradesh": ["Shimla", "Manali", "Dharamshala", "Solan"],
  "Jharkhand": ["Ranchi", "Jamshedpur", "Dhanbad", "Bokaro"],
  "Karnataka": ["Bengaluru", "Mysuru", "Mangaluru", "Hubballi", "Belagavi"],
  "Kerala": ["Kochi", "Thiruvananthapuram", "Kozhikode", "Thrissur", "Kollam"],
  "Madhya Pradesh": ["Bhopal", "Indore", "Gwalior", "Jabalpur", "Ujjain"],
  "Maharashtra": ["Mumbai", "Pune", "Nagpur", "Nashik", "Aurangabad", "Kolhapur"],
  "Manipur": ["Imphal"],
  "Meghalaya": ["Shillong", "Tura"],
  "Mizoram": ["Aizawl"],
  "Nagaland": ["Kohima", "Dimapur"],
  "Odisha": ["Bhubaneswar", "Cuttack", "Rourkela", "Puri", "Sambalpur"],
  "Punjab": ["Ludhiana", "Amritsar", "Jalandhar", "Patiala", "Bathinda"],
  "Rajasthan": ["Jaipur", "Jodhpur", "Udaipur", "Kota", "Ajmer", "Bikaner", "Alwar"],
  "Sikkim": ["Gangtok"],
  "Tamil Nadu": ["Chennai", "Coimbatore", "Madurai", "Salem", "Tiruchirappalli"],
  "Telangana": ["Hyderabad", "Warangal", "Karimnagar", "Nizamabad"],
  "Tripura": ["Agartala"],
  "Uttar Pradesh": ["Lucknow", "Kanpur", "Agra", "Varanasi", "Prayagraj", "Meerut"],
  "Uttarakhand": ["Dehradun", "Haridwar", "Nainital", "Rishikesh"],
  "West Bengal": ["Kolkata", "Siliguri", "Durgapur", "Asansol"]
};

    const stateSelect = document.getElementById("stateSelect");
    const citySelect = document.getElementById("citySelect");

    // Initialize State Dropdown
    for (let state in stateCityData) {
        let option = document.createElement("option");
        option.value = state;
        option.text = state;
        stateSelect.appendChild(option);
    }

    function updateCities() {
        const selectedState = stateSelect.value;

        // Clear previous cities
        citySelect.innerHTML = '<option value="" disabled selected>Select City</option>';

        if (selectedState && stateCityData[selectedState]) {
            citySelect.disabled = false;
            stateCityData[selectedState].forEach(city => {
                let option = document.createElement("option");
                option.value = city;
                option.text = city;
                citySelect.appendChild(option);
            });
        } else {
            citySelect.disabled = true;
        }
    }
</script>

{% endblock %}
